name: Build MSIX

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: |
        dotnet restore TaskTrackerApp\TaskTrackerApp.csproj -r win-x64
        msbuild TaskTrackerApp.Packaging\TaskTrackerApp.Packaging.wapproj /t:Restore /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64

    - name: Build MSIX bundle
      run: msbuild TaskTrackerApp.Packaging\TaskTrackerApp.Packaging.wapproj /p:Configuration=Release /p:Platform=x64 /p:UapAppxPackageBuildMode=StoreUpload /p:AppxBundle=Always /p:AppxPackageSigningEnabled=false /p:RuntimeIdentifier=win-x64

    - name: Upload MSIX
      uses: actions/upload-artifact@v4
      with:
        name: TaskTrackerApp-MSIX
        path: TaskTrackerApp.Packaging\AppPackages\**\*.msixupload
